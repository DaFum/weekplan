<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wochen-Power</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#0284c7" id="themeMeta">
    <style>
        :root {
            --bg-primary: #f0f9ff;
            --bg-secondary: #ffffff;
            --bg-accent: #e0f2fe;
            --text-primary: #0c4a6e;
            --text-secondary: #0369a1;
            --text-accent: #0284c7;
            --border-color: #bae6fd;
            --shadow-color: rgba(2, 132, 199, 0.2);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }
        
        .dark {
            --bg-primary: #0c2a4d;
            --bg-secondary: #0f3460;
            --bg-accent: #1a3d6d;
            --text-primary: #e0f2fe;
            --text-secondary: #bae6fd;
            --text-accent: #7dd3fc;
            --border-color: #1e40af;
            --shadow-color: rgba(56, 189, 248, 0.2);
            --success: #34d399;
            --warning: #fbbf24;
            --danger: #f87171;
        }
        
        body {
            font-family: 'Nunito', sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.3s;
            font-size: 16px;
            line-height: 1.6;
        }
        
        .modal-open {
            overflow: hidden;
        }
        
        .modal-content {
            animation: slide-up 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            background-color: var(--bg-primary);
        }
        
        @keyframes slide-up {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }
        
        .konfetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }
        
        .konfetti-stueck {
            position: absolute;
            width: 10px;
            height: 10px;
            opacity: 0;
            animation: konfetti-fallen 3s ease-out forwards;
        }
        
        @keyframes konfetti-fallen {
            0% {
                transform: translateY(-100vh) rotateZ(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotateZ(720deg);
                opacity: 0;
            }
        }
        
        .today-card {
            border: 3px solid var(--text-accent);
            transform: scale(1.02);
            box-shadow: 0 10px 25px -5px var(--shadow-color), 0 8px 10px -6px var(--shadow-color);
        }
        
        .tag-container {
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        
        .tag-container::-webkit-scrollbar {
            display: none;
        }
        
        .tag-karte {
            scroll-snap-align: center;
            transition: transform 0.3s ease;
            background-color: var(--bg-secondary);
        }
        
        .header-title {
            background: linear-gradient(45deg, #0284c7, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.25rem;
        }
        
        @media (min-width: 640px) {
            .header-title {
                font-size: 2.75rem;
            }
        }
        
        .dark .header-title {
            background: linear-gradient(45deg, #7dd3fc, #0284c7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .task-card {
            animation: pop-in 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: scale(0.95);
        }
        
        @keyframes pop-in {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .progress-ring circle {
            transition: stroke-dashoffset 0.5s ease;
        }
        
        .task-input:focus {
            box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.3);
        }
        
        .category-btn.active {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .empty-state {
            animation: fade-in 0.5s ease;
        }
        
        @keyframes fade-in {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(2, 132, 199, 0.4);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(2, 132, 199, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(2, 132, 199, 0);
            }
        }
        
        .game-card {
            transition: all 0.3s ease;
        }
        
        .game-card:hover {
            transform: translateY(-5px);
        }
        
        .level-up {
            animation: level-up 1s ease;
        }
        
        @keyframes level-up {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }
        
        .coin {
            animation: coin-spin 2s infinite linear;
        }
        
        @keyframes coin-spin {
            0% {
                transform: rotateY(0);
            }
            100% {
                transform: rotateY(360deg);
            }
        }
        
        .minigame-modal {
            animation: slide-in 0.3s ease-out;
        }
        
        @keyframes slide-in {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        /* Mobile-first responsive design */
        .task-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }
        
        @media (min-width: 768px) {
            .task-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (min-width: 1024px) {
            .task-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        .memory-card {
            aspect-ratio: 3/4;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        @media (min-width: 640px) {
            .memory-card {
                font-size: 2rem;
            }
        }
        
        .quiz-option {
            padding: 0.75rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }
        
        .quiz-option:hover {
            transform: translateY(-2px);
        }
        
        .floating-button {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 40;
        }
        
        @media (max-width: 640px) {
            .floating-button {
                right: auto;
                left: 1rem;
            }
        }
        
        @media (min-width: 640px) {
            .floating-button {
                bottom: 2rem;
                right: 2rem;
            }
        }
        
        .nav-button {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 700;
            transition: all 0.2s;
        }
        
        @media (min-width: 640px) {
            .nav-button {
                padding: 0.5rem 1.5rem;
            }
        }
        
        .task-card-button {
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .progress-container {
            height: 0.5rem;
            border-radius: 0.25rem;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            transition: width 0.5s ease;
        }
        
        .stats-card {
            padding: 1rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        @media (min-width: 640px) {
            .stats-card {
                padding: 1.5rem;
            }
        }
        
        .game-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        .game-card {
            padding: 1rem;
            border-radius: 0.75rem;
            cursor: pointer;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        @media (min-width: 640px) {
            .modal-title {
                font-size: 1.875rem;
            }
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .form-input, .form-select {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border-color);
            background-color: var(--bg-accent);
            transition: all 0.2s;
        }
        
        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--text-accent);
            box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.3);
        }
        
        .button-group {
            display: flex;
            gap: 1rem;
        }
        
        .btn {
            flex: 1;
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-weight: 700;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background-color: var(--text-accent);
            color: white;
        }
        
        .btn-primary:hover {
            background-color: #0369a1;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background-color: var(--bg-accent);
            color: var(--text-secondary);
        }
        
        .btn-secondary:hover {
            background-color: var(--border-color);
        }
        
        .task-category-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            display: inline-block;
            margin-top: 0.25rem;
        }
        
        .task-name {
            font-weight: 700;
        }
        
        .task-duration {
            font-size: 0.875rem;
            font-weight: 400;
        }
        
        .task-actions {
            display: flex;
            gap: 0.25rem;
        }
        
        .task-card {
            padding: 1rem;
            border-radius: 0.75rem;
            border: 1px solid var(--border-color);
            background-color: var(--bg-accent);
            transition: all 0.2s;
        }
        
        .task-card.completed {
            opacity: 0.7;
        }
        
        .task-card.completed .task-name {
            text-decoration: line-through;
        }
        
        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .day-title {
            font-size: 1.25rem;
            font-weight: 700;
        }
        
        .day-date {
            font-size: 0.875rem;
            font-weight: 400;
            color: var(--text-secondary);
        }
        
        .day-score {
            font-size: 1rem;
            font-weight: 700;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            background-color: #fef3c7;
            color: #92400e;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        
        .tasks-container {
            min-height: 10rem;
        }
        
        .empty-tasks {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            border: 2px dashed var(--border-color);
            border-radius: 0.75rem;
        }
        
        .empty-tasks-icon {
            width: 4rem;
            height: 4rem;
            margin-bottom: 1rem;
            color: var(--text-secondary);
        }
        
        .empty-tasks-title {
            font-weight: 700;
            margin-bottom: 0.25rem;
        }
        
        .empty-tasks-text {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        .week-navigation {
            display: flex;
            justify-content: space-around;
            background-color: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            position: sticky;
            top: 1rem;
            z-index: 20;
            padding: 0.5rem;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 1.5rem;
        }
        
        .dark .week-navigation {
            background-color: rgba(15, 52, 96, 0.7);
        }
        
        .motivation-text {
            font-size: 1.125rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }
        
        .header-container {
            text-align: center;
            margin: 1.5rem 0;
            position: relative;
        }
        
        .theme-toggle {
            position: absolute;
            top: 0;
            right: 0;
            padding: 0.5rem;
            border-radius: 50%;
        }
        
        .coins-display {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            background-color: #fef3c7;
            color: #92400e;
            font-weight: 700;
        }
        
        .game-section {
            background-color: var(--bg-secondary);
            border-radius: 1rem;
            padding: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 1.5rem;
        }
        
        .game-section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .game-section-title {
            font-size: 1.25rem;
            font-weight: 700;
        }
        
        .memory-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .quiz-progress {
            display: flex;
            justify-content: space-between;
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        
        .quiz-question {
            font-size: 1.125rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 1rem;
        }
        
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .ripple {
            position: absolute;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.7);
            transform: scale(0);
            animation: ripple 0.6s linear;
        }
        
        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
    </style>
</head>
<body class="text-slate-800">

    <div id="konfetti-container" class="konfetti"></div>

    <div class="container mx-auto max-w-4xl p-4 min-h-screen flex flex-col">
        <header class="header-container">
            <h1 class="header-title font-black">Wochen-Power</h1>
            <p id="motivations-spruch" class="motivation-text">Lade deine Woche mit Erfolg auf!</p>
            <button id="theme-toggle" class="theme-toggle text-secondary hover:bg-accent transition-colors">
                <span id="theme-icon" class="text-2xl">🌞</span>
            </button>
        </header>

        <section class="task-grid mb-6">
            <div id="pc-time-tracker" class="stats-card"></div>
            <div id="weekly-goal-tracker" class="stats-card"></div>
            <div id="streak-tracker" class="stats-card"></div>
        </section>

        <div class="game-section">
            <div class="game-section-header">
                <h2 class="game-section-title">🎮 Mini-Spiele</h2>
                <div class="coins-display">
                    <span class="coin">🪙</span>
                    <span id="coins-count">0</span>
                </div>
            </div>
            <div class="game-grid">
                <div class="game-card bg-gradient-to-r from-blue-400 to-blue-600 text-white" onclick="openGame('memory')">
                    <div class="font-bold">Memory</div>
                    <div class="text-sm opacity-90">Finde Paare</div>
                </div>
                <div class="game-card bg-gradient-to-r from-green-400 to-green-600 text-white" onclick="openGame('quiz')">
                    <div class="font-bold">Quiz</div>
                    <div class="text-sm opacity-90">Wissenscheck</div>
                </div>
            </div>
        </div>

        <nav id="wochen-nav" class="week-navigation"></nav>
        <main id="wochen-container" class="flex-grow"></main>

        <div class="floating-button">
            <button onclick="openModal()" class="bg-indigo-600 text-white rounded-full w-16 h-16 flex items-center justify-center shadow-lg hover:shadow-xl hover:bg-indigo-700 transform hover:scale-110 transition-all duration-300 pulse relative overflow-hidden">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-8 h-8">
                    <path fill-rule="evenodd" d="M12 3.75a.75.75 0 01.75.75v6.75h6.75a.75.75 0 010 1.5h-6.75v6.75a.75.75 0 01-1.5 0v-6.75H4.5a.75.75 0 010-1.5h6.75V4.5a.75.75 0 01.75-.75z" clip-rule="evenodd" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Modal für Aufgaben -->
    <div id="task-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-end">
        <div class="modal-content w-full max-w-lg mx-auto rounded-t-3xl p-6">
            <div class="modal-header">
                <h2 id="modal-title" class="modal-title">Neue Aufgabe erstellen</h2>
                <button onclick="closeModal()" class="text-secondary hover:text-accent">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <form id="task-form" onsubmit="saveTask(event)">
                <input type="hidden" id="task-id">
                <div class="form-group">
                    <label for="task-name" class="form-label">Was steht an?</label>
                    <input type="text" id="task-name"
                           placeholder="z. B. Mathe Hausaufgaben"
                           class="form-input" required
                           oninput="this.value=this.value.trimStart().charAt(0).toUpperCase()+this.value.slice(1).trimEnd()">
                </div>
                <div class="form-group">
                    <label class="form-label">Kategorie</label>
                    <div class="flex space-x-2" id="kategorie-selector">
                        <label class="flex-1">
                            <input type="radio" name="kategorie" value="schule" class="sr-only" checked>
                            <div class="category-btn p-3 text-center rounded-lg border-2 border-border-color cursor-pointer transition">📚 Schule</div>
                        </label>
                        <label class="flex-1">
                            <input type="radio" name="kategorie" value="pc" class="sr-only">
                            <div class="category-btn p-3 text-center rounded-lg border-2 border-border-color cursor-pointer transition">💻 PC-Zeit</div>
                        </label>
                        <label class="flex-1">
                            <input type="radio" name="kategorie" value="sonstiges" class="sr-only">
                            <div class="category-btn p-3 text-center rounded-lg border-2 border-border-color cursor-pointer transition">🎉 Freizeit</div>
                        </label>
                    </div>
                </div>
                <div id="pc-duration-container" class="form-group hidden">
                    <label for="task-duration" class="form-label">Dauer (in Minuten)</label>
                    <input type="number" id="task-duration" placeholder="z.B. 60" min="1" class="form-input">
                </div>
                <div class="form-group">
                    <label for="task-date" class="form-label">Tag</label>
                    <select id="task-date" class="form-select"></select>
                </div>
                <div class="button-group">
                    <button type="submit" class="btn btn-primary relative overflow-hidden">Speichern</button>
                    <button type="button" onclick="closeModal()" class="btn btn-secondary relative overflow-hidden">Abbrechen</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Generisches Modal für Einstellungen -->
    <div id="prompt-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-end">
        <div class="modal-content w-full max-w-lg mx-auto rounded-t-3xl p-6">
            <div class="modal-header">
                <h2 id="prompt-modal-title" class="modal-title">Einstellung ändern</h2>
                <button onclick="closePromptModal()" class="text-secondary hover:text-accent">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <form id="prompt-form">
                <div class="form-group">
                    <label id="prompt-modal-label" for="prompt-modal-input" class="form-label">Wert</label>
                    <input type="number" id="prompt-modal-input" min="0" step="1" class="form-input" required>
                </div>
                <div class="button-group">
                    <button type="submit" class="btn btn-primary relative overflow-hidden">Speichern</button>
                    <button type="button" onclick="closePromptModal()" class="btn btn-secondary relative overflow-hidden">Abbrechen</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Memory Game Modal -->
    <div id="memory-game-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
        <div class="minigame-modal bg-secondary rounded-2xl p-6 w-full max-w-md">
            <div class="modal-header">
                <h2 class="modal-title">Memory Spiel</h2>
                <button onclick="closeGame()" class="text-secondary hover:text-accent">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="quiz-progress">
                <span>Punkte: <span id="memory-score">0</span></span>
                <span>Paare: <span id="memory-pairs">0</span>/6</span>
            </div>
            <div class="progress-container bg-gray-200 dark:bg-gray-700 mb-4">

                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">

                    </svg>
                </button>

    <script>
        // --- Globale Variablen & Konstanten ---
        const wochentage = ["Sonntag", "Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag"];
        const motivationsSprueche = [
            "Du bist großartig! 🌟", 
            "Mach weiter so! 💪", 
            "Du schaffst das! 🎯", 
            "Heute wird ein super Tag! 🌈", 
            "Bleib dran! 🚀", 
            "Du bist auf dem richtigen Weg! 🛤️",
            "Kleine Schritte, große Erfolge! 🐢",
            "Du bist ein Star! ⭐",
            "Gib niemals auf! 💎",
            "Du bist unschlagbar! 🦸"
        ];
        const kategorieDetails = {
            schule: { icon: '📚', color: 'bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-200' }, 
            pc: { icon: '💻', color: 'bg-purple-100 text-purple-800 dark:bg-purple-900 dark:text-purple-200' }, 
            sonstiges: { icon: '🎉', color: 'bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200' }
        };
        let tasks = [];
        let aktiveWoche = 0;
        let pcStundenGesamt = 0;
        let wochenZiel = 10;
        let sounds = {};
        let promptCallback = null;
        let inMemoryStorage = {};
        let coins = 0;
        let currentGame = null;

        // --- Datums- & Formatierungshelfer ---
        const getISODate = (date) => date.toISOString().split('T')[0];
        const getStartOfWeek = (date) => {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            d.setHours(0, 0, 0, 0);
            return new Date(d.setDate(diff));
        };
        const formatDisplayDate = (date) => `${wochentage[date.getDay()]}, ${String(date.getDate()).padStart(2, '0')}.${String(date.getMonth() + 1).padStart(2, '0')}`;
        const formatMinutes = (minutes) => {
            if (minutes < 0) minutes = 0;
            const h = Math.floor(minutes / 60);
            const m = minutes % 60;
            return `${h} Std ${m} Min`;
        };

        // --- Storage Helper (localStorage with fallback) ---
        const storage = {
            setItem: (key, value) => {
                try {
                    localStorage.setItem(key, value);
                } catch (e) {
                    // Fallback to in-memory storage
                    inMemoryStorage[key] = value;
                }
            },
            getItem: (key) => {
                try {
                    return localStorage.getItem(key);
                } catch (e) {
                    // Fallback to in-memory storage
                    return inMemoryStorage[key] || null;
                }
            }
        };

        // --- App Initialisierung ---
        document.addEventListener('DOMContentLoaded', () => {
            initEventListeners();
            initSounds();
            loadData();
            initTheme();
            cleanupOldTasks();
            renderAllUI();
            updateMotivationsspruch();
            scrollToCurrentDay();
            initGames();
            
            // Ask for notifications
            if (!localStorage.getItem('notifsAsked') && 'Notification' in window) {
                Notification.requestPermission().then(() => localStorage.setItem('notifsAsked', 1));
            }
        });

        function renderAllUI() {
            renderTimeTracker();
            renderWeeklyGoalTracker();
            renderStreakTracker();
            renderPlan();
            updateCoinsDisplay();
            updateMetaBar();
        }

        // --- Event Listener Initialisierung ---
        function initEventListeners() {
            document.body.addEventListener('click', function(event) {
                if (event.target.closest('#pc-time-settings-btn')) {
                    setPcTimeLimit();
                }
                if (event.target.closest('#weekly-goal-settings-btn')) {
                    setWeeklyGoal();
                }
                if (event.target.closest('#theme-toggle')) {
                    toggleTheme();
                }
                
                // Add ripple effect to buttons
                if (event.target.closest('button')) {
                    createRipple(event);
                }
            });

            document.getElementById('prompt-form').addEventListener('submit', (event) => {
                event.preventDefault();
                const value = document.getElementById('prompt-modal-input').value;
                if (promptCallback && value !== null && !isNaN(value) && value >= 0) {
                    promptCallback(value);
                }
                closePromptModal();
            });
        }

        // --- Ripple Effect ---
        function createRipple(event) {
            const button = event.currentTarget;
            const circle = document.createElement("span");
            const diameter = Math.max(button.clientWidth, button.clientHeight);
            const radius = diameter / 2;
            
            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${event.clientX - button.getBoundingClientRect().left - radius}px`;
            circle.style.top = `${event.clientY - button.getBoundingClientRect().top - radius}px`;
            circle.classList.add("ripple");
            
            const ripple = button.getElementsByClassName("ripple")[0];
            if (ripple) {
                ripple.remove();
            }
            
            button.appendChild(circle);
        }

        // --- Sound Initialisierung ---
        function initSounds() {
            sounds.complete = new Tone.Synth({ oscillator: { type: "sine" }, envelope: { attack: 0.005, decay: 0.1, sustain: 0.3, release: 0.5 } }).toDestination();
            sounds.confetti = new Tone.Synth({ oscillator: { type: "triangle" }, envelope: { attack: 0.01, decay: 0.2, sustain: 0.2, release: 0.5 } }).toDestination();
            sounds.coin = new Tone.Synth({ oscillator: { type: "square" }, envelope: { attack: 0.01, decay: 0.1, sustain: 0.1, release: 0.1 } }).toDestination();
        }

        // --- UI Rendering Funktionen ---
        function renderTimeTracker() {
            const container = document.getElementById('pc-time-tracker');
            const startOfWeek = getStartOfWeek(new Date());
            const endOfWeek = new Date(startOfWeek); endOfWeek.setDate(endOfWeek.getDate() + 7);
            const usedMinutes = tasks.filter(t => t.kategorie === 'pc' && t.erledigt && t.date >= getISODate(startOfWeek) && t.date < getISODate(endOfWeek)).reduce((sum, t) => sum + (t.durationInMinutes || 0), 0);
            const totalMinutes = pcStundenGesamt * 60;
            const remainingMinutes = totalMinutes - usedMinutes;
            const progress = totalMinutes > 0 ? Math.min((usedMinutes / totalMinutes), 1) : 0;
            const circumference = 30 * 2 * Math.PI;

            container.innerHTML = `
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-lg font-bold">💻 PC-Spielzeit</h2>
                    <button id="pc-time-settings-btn" class="text-secondary hover:text-accent transition p-1 rounded-full hover:bg-accent">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </button>
                </div>
                <div class="flex items-center gap-4">
                    <div class="relative w-20 h-20">
                        <svg class="w-full h-full" viewBox="0 0 36 36">
                            <circle class="text-gray-300 dark:text-gray-600" stroke-width="3" stroke="currentColor" fill="transparent" r="15" cx="18" cy="18" />
                            <circle class="progress-ring text-green-500" stroke-width="3" stroke-dasharray="${circumference}" stroke-dashoffset="${circumference * (1 - progress)}" stroke-linecap="round" stroke="currentColor" fill="transparent" r="15" cx="18" cy="18" style="transform: rotate(-90deg); transform-origin: center;"/>
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center text-sm font-bold">${Math.round(progress * 100)}%</div>
                    </div>
                    <div>
                        <div class="text-lg font-bold">${formatMinutes(remainingMinutes)}</div>
                        <div class="text-sm text-secondary">verbleibend</div>
                    </div>
                </div>`;
        }
        
        function renderWeeklyGoalTracker() {
            const container = document.getElementById('weekly-goal-tracker');
            const startOfWeek = getStartOfWeek(new Date());
            const endOfWeek = new Date(startOfWeek); endOfWeek.setDate(endOfWeek.getDate() + 7);
            const tasksDone = tasks.filter(t => t.erledigt && t.date >= getISODate(startOfWeek) && t.date < getISODate(endOfWeek)).length;
            const progress = wochenZiel > 0 ? Math.min((tasksDone / wochenZiel) * 100, 100) : 0;

            container.innerHTML = `
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-lg font-bold">🎯 Wochenziel</h2>
                    <button id="weekly-goal-settings-btn" class="text-secondary hover:text-accent transition p-1 rounded-full hover:bg-accent">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </button>
                </div>
                <div class="text-lg font-bold mb-2">${tasksDone} / ${wochenZiel} Aufgaben</div>
                <div class="progress-container bg-gray-200 dark:bg-gray-700">
                    <div class="progress-bar bg-blue-500" style="width: ${progress}%"></div>
                </div>`;
        }

        function renderStreakTracker() {
            const container = document.getElementById('streak-tracker');
            const streak = getCurrentStreak();
            container.innerHTML = `
                <h2 class="text-lg font-bold mb-2">🔥 Streak</h2>
                <div class="text-3xl font-black text-orange-500">${streak}</div>
                <div class="text-sm text-secondary">Tage in Folge</div>`;
        }

        function getCurrentStreak() {
            const sorted = [...tasks].filter(t => t.erledigt).sort((a, b) => new Date(b.date) - new Date(a.date));
            let streak = 0;
            let cursor = new Date();
            cursor.setHours(0, 0, 0, 0);
            
            for (const task of sorted) {
                const taskDate = new Date(task.date);
                taskDate.setHours(0, 0, 0, 0);
                
                if (taskDate.getTime() === cursor.getTime()) {
                    streak++;
                    cursor.setDate(cursor.getDate() - 1);
                } else if (taskDate.getTime() < cursor.getTime()) {
                    // Check if it's the previous day
                    const prevDay = new Date(cursor);
                    prevDay.setDate(prevDay.getDate() - 1);
                    if (taskDate.getTime() === prevDay.getTime()) {
                        streak++;
                        cursor = prevDay;
                    } else {
                        break;
                    }
                }
            }
            return streak;
        }

        function renderPlan() {
            const wochenContainer = document.getElementById('wochen-container');
            const wochenNav = document.getElementById('wochen-nav');
            wochenContainer.innerHTML = ''; wochenNav.innerHTML = '';
            const startOfCurrentWeek = getStartOfWeek(new Date());
            const todayISO = getISODate(new Date());

            for (let week = 0; week < 4; week++) {
                const weekStart = new Date(startOfCurrentWeek); weekStart.setDate(weekStart.getDate() + week * 7);
                const navBtn = document.createElement('button');
                navBtn.innerHTML = `Woche ${week + 1}`;
                navBtn.className = `nav-button`;
                navBtn.dataset.weekIndex = week;
                navBtn.onclick = () => showWoche(week);
                wochenNav.appendChild(navBtn);

                const wochenAnsicht = document.createElement('div');
                wochenAnsicht.id = `woche-${week}`;
                wochenAnsicht.className = 'wochen-ansicht hidden';
                
                const tagesContainer = document.createElement('div');
                tagesContainer.className = 'tag-container flex overflow-x-auto pb-4 space-x-4 px-1 task-grid';

                for (let day = 0; day < 7; day++) {
                    const currentDate = new Date(weekStart); currentDate.setDate(currentDate.getDate() + day);
                    const isoDate = getISODate(currentDate);
                    const isToday = isoDate === todayISO;
                    if(isToday) aktiveWoche = week;
                    
                    const tagesKarte = document.createElement('div');
                    tagesKarte.id = isoDate;
                    tagesKarte.className = `tag-karte p-5 rounded-2xl shadow-lg ${isToday ? 'today-card' : ''}`;
                    
                    const punkte = getPunkteFuerTag(isoDate);
                    tagesKarte.innerHTML = `
                        <div class="day-header">
                            <div>
                                <h3 class="day-title">${formatDisplayDate(currentDate).split(',')[0]}</h3>
                                <div class="day-date">${formatDisplayDate(currentDate).split(',')[1]}</div>
                            </div>
                            <div class="day-score"><span class="text-yellow-500">⭐</span> ${punkte}</div>
                        </div>
                        <div id="aufgaben-liste-${isoDate}" class="tasks-container space-y-3"></div>`;
                    tagesContainer.appendChild(tagesKarte);
                }
                wochenAnsicht.appendChild(tagesContainer);
                wochenContainer.appendChild(wochenAnsicht);
            }
            renderAllTasks();
            showWoche(aktiveWoche);
        }

        function showWoche(index) {
            aktiveWoche = index;
            document.querySelectorAll('.wochen-ansicht').forEach(el => el.classList.add('hidden'));
            document.getElementById(`woche-${index}`).classList.remove('hidden');
            document.querySelectorAll('.nav-button').forEach(btn => {
                const isActive = parseInt(btn.dataset.weekIndex) === index;
                btn.classList.toggle('bg-indigo-600', isActive);
                btn.classList.toggle('text-white', isActive);
                btn.classList.toggle('bg-accent', !isActive);
                btn.classList.toggle('text-secondary', !isActive);
            });
        }

        function renderAllTasks() {
            document.querySelectorAll('[id^="aufgaben-liste-"]').forEach(list => {
                list.innerHTML = '';
                const isoDate = list.id.replace('aufgaben-liste-', '');
                const tasksForDay = tasks.filter(t => t.date === isoDate);
                if (tasksForDay.length === 0) {
                    list.innerHTML = `
                        <div class="empty-tasks">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="empty-tasks-icon">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            <p class="empty-tasks-title">Keine Aufgaben!</p>
                            <p class="empty-tasks-text">Füge eine neue Aufgabe hinzu.</p>
                        </div>`;
                } else {
                    tasksForDay.forEach(task => list.appendChild(createTaskElement(task)));
                }
            });
            
            // Initialize SortableJS for each task list
            document.querySelectorAll('[id^="aufgaben-liste-"]').forEach(list => {
                new Sortable(list, {
                    animation: 150,
                    ghostClass: 'opacity-50',
                    onEnd: (evt) => {
                        // Re-order array to match DOM
                        const taskId = evt.item.dataset.taskId;
                        const newIndex = evt.newIndex;
                        const oldIndex = evt.oldIndex;
                        
                        // Find tasks for this date
                        const isoDate = list.id.replace('aufgaben-liste-', '');
                        const tasksForDay = tasks.filter(t => t.date === isoDate);
                        
                        // Reorder the tasks array
                        const taskToMove = tasksForDay.splice(oldIndex, 1)[0];
                        tasksForDay.splice(newIndex, 0, taskToMove);
                        
                        // Update the main tasks array
                        const otherTasks = tasks.filter(t => t.date !== isoDate);
                        tasks = [...otherTasks, ...tasksForDay];
                        
                        saveData();
                    }
                });
            });
            
            updatePunkteAnzeige();
        }

        function createTaskElement(task) {
            const details = kategorieDetails[task.kategorie];
            const element = document.createElement('div');
            element.className = `task-card ${task.erledigt ? 'completed' : ''}`;
            element.dataset.taskId = task.id;
            const durationText = task.kategorie === 'pc' && task.durationInMinutes ? `<span class="task-duration">(${task.durationInMinutes} Min)</span>` : '';
            element.innerHTML = `
                <div class="flex items-start">
                    <div class="mr-3 text-xl">${details.icon}</div>
                    <div class="flex-grow">
                        <div class="task-name">${task.name}</div>
                        ${durationText}
                        <div class="task-category-badge ${details.color}">
                            ${task.kategorie === 'schule' ? 'Schule' : task.kategorie === 'pc' ? 'PC-Zeit' : 'Freizeit'}
                        </div>
                    </div>
                </div>
                <div class="task-actions mt-3 flex justify-end">
                    <button onclick="openModal('${task.id}')" class="task-card-button text-secondary hover:bg-border-color relative overflow-hidden" aria-label="Bearbeiten">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10" />
                        </svg>
                    </button>
                    <button onclick="toggleTask('${task.id}')" class="task-card-button ${task.erledigt ? 'bg-green-500' : 'border-2 border-current'} text-white font-bold text-lg relative overflow-hidden" aria-label="${task.erledigt ? 'Erledigt' : 'Als erledigt markieren'}">
                        ${task.erledigt ? '✓' : ''}
                    </button>
                    <button onclick="deleteTask('${task.id}')" class="task-card-button text-secondary hover:bg-red-200 dark:hover:bg-red-800 hover:text-red-600 relative overflow-hidden" aria-label="Löschen">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
                        </svg>
                    </button>
                </div>`;
            return element;
        }
        
        const getPunkteFuerTag = (isoDate) => tasks.filter(t => t.date === isoDate && t.erledigt).length;
        const updatePunkteAnzeige = () => document.querySelectorAll('.tag-karte').forEach(card => {
            const anzeige = card.querySelector('.day-score');
            if (anzeige) anzeige.innerHTML = `<span class="text-yellow-500">⭐</span> ${getPunkteFuerTag(card.id)}`;
        });

        // --- Daten- & Aufgaben-Management ---
        function saveTask(event) {
            event.preventDefault();
            const taskId = document.getElementById('task-id').value;
            const kategorie = document.querySelector('input[name="kategorie"]:checked').value;
            const taskData = {
                name: document.getElementById('task-name').value,
                kategorie: kategorie,
                date: document.getElementById('task-date').value,
                durationInMinutes: kategorie === 'pc' ? parseInt(document.getElementById('task-duration').value) || 0 : 0
            };

            if (taskId) {
                const taskIndex = tasks.findIndex(t => t.id === taskId);
                if (taskIndex > -1) {
                    tasks[taskIndex] = { ...tasks[taskIndex], ...taskData };
                }
            } else {
                tasks.push({ ...taskData, id: 'task-' + Date.now(), erledigt: false });
                
                // Send notification if permission granted
                if (Notification.permission === 'granted') {
                    new Notification(`Neue Aufgabe: ${taskData.name}`, {
                        body: `Am ${formatDisplayDate(new Date(taskData.date))}`,
                        icon: 'https://cdn.jsdelivr.net/gh/twitter/twemoji@latest/assets/72x72/1f4cb.png'
                    });
                }
            }
            saveData();
            renderAllUI();
            closeModal();
        }

        function toggleTask(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (task) {
                task.erledigt = !task.erledigt;
                if (task.erledigt) {
                    sounds.complete.triggerAttackRelease("C4", "0.2");
                    starteKonfetti();
                    addCoins(5);
                }
                saveData();
                renderAllUI();
            }
        }

        function deleteTask(taskId) {
            tasks = tasks.filter(t => t.id !== taskId);
            saveData();
            renderAllUI();
        }

        // --- Einstellungsfunktionen ---
        function setPcTimeLimit() {
            openPromptModal(
                "PC-Zeit Limit ändern",
                "PC-Stunden pro Woche:",
                pcStundenGesamt,
                (newValue) => {
                    pcStundenGesamt = parseFloat(newValue);
                    saveData();
                    renderTimeTracker();
                }
            );
        }

        function setWeeklyGoal() {
            openPromptModal(
                "Wochenziel ändern",
                "Aufgaben-Ziel pro Woche:",
                wochenZiel,
                (newValue) => {
                    wochenZiel = parseInt(newValue);
                    saveData();
                    renderWeeklyGoalTracker();
                }
            );
        }

        // --- Local Storage & Aufräumen ---
        function cleanupOldTasks() {
            const startOfCurrentWeekISO = getISODate(getStartOfWeek(new Date()));
            tasks = tasks.filter(task => task.date && task.date >= startOfCurrentWeekISO);
        }
        
        function saveData() {
            const dataToSave = {
                tasks: tasks,
                pcStundenGesamt: pcStundenGesamt,
                wochenZiel: wochenZiel,
                theme: document.body.classList.contains('dark') ? 'dark' : 'light',
                coins: coins
            };
            try {
                storage.setItem('wochenplanerData', JSON.stringify(dataToSave));
            } catch (e) {
                console.error("Fehler beim Speichern der Daten:", e);
            }
        }
        
        function loadData() {
            try {
                const data = JSON.parse(storage.getItem('wochenplanerData') || '{}');
                tasks = data.tasks || [];
                pcStundenGesamt = data.pcStundenGesamt || 0;
                wochenZiel = data.wochenZiel || 10;
                coins = data.coins || 0;
            } catch (e) {
                console.error("Fehler beim Laden der Daten:", e);
                tasks = [];
                pcStundenGesamt = 0;
                wochenZiel = 10;
                coins = 0;
            }
        }

        // --- Modal & Helfer ---
        function openModal(taskId = null) {
            const modal = document.getElementById('task-modal');
            const form = document.getElementById('task-form');
            form.reset();
            const title = document.getElementById('modal-title');
            const idInput = document.getElementById('task-id');
            
            if (taskId) {
                const task = tasks.find(t => t.id === taskId);
                title.textContent = "Aufgabe bearbeiten";
                idInput.value = task.id;
                document.getElementById('task-name').value = task.name;
                document.querySelector(`input[name="kategorie"][value="${task.kategorie}"]`).checked = true;
                if (task.kategorie === 'pc') {
                    document.getElementById('task-duration').value = task.durationInMinutes;
                }
            } else {
                title.textContent = "Neue Aufgabe erstellen";
                idInput.value = '';
            }
            
            const taskDateSelect = document.getElementById('task-date');
            taskDateSelect.innerHTML = '';
            const startOfWeek = getStartOfWeek(new Date());
            const todayISO = getISODate(new Date());
            for (let week = 0; week < 4; week++) {
                const optgroup = document.createElement('optgroup');
                optgroup.label = `Woche ${week + 1}`;
                for (let day = 0; day < 7; day++) {
                    const currentDate = new Date(startOfWeek); currentDate.setDate(currentDate.getDate() + week * 7 + day);
                    const isoDate = getISODate(currentDate);
                    const option = document.createElement('option');
                    option.value = isoDate;
                    option.textContent = formatDisplayDate(currentDate);
                    if (taskId) {
                        const taskToEdit = tasks.find(t => t.id === taskId);
                        if (taskToEdit) {
                            option.selected = (isoDate === taskToEdit.date);
                        }
                    } else {
                        option.selected = (isoDate === todayISO);
                    }
                    optgroup.appendChild(option);
                }
                taskDateSelect.appendChild(optgroup);
            }
            
            setupRadioStyling();
            modal.classList.remove('hidden');
            document.body.classList.add('modal-open');
        }
        
        function closeModal() { 
            document.getElementById('task-modal').classList.add('hidden'); 
            document.body.classList.remove('modal-open'); 
        }
        
        function openPromptModal(title, label, initialValue, callback) {
            promptCallback = callback;
            document.getElementById('prompt-modal-title').textContent = title;
            document.getElementById('prompt-modal-label').textContent = label;
            const input = document.getElementById('prompt-modal-input');
            input.value = initialValue;
            input.step = label.toLowerCase().includes('stunden') ? "0.5" : "1";
            input.min = "0";
            document.getElementById('prompt-modal').classList.remove('hidden');
            document.body.classList.add('modal-open');
        }

        function closePromptModal() {
            document.getElementById('prompt-modal').classList.add('hidden');
            if (!document.getElementById('task-modal').classList.contains('hidden')) {
                // do nothing, task modal is open
            } else {
                document.body.classList.remove('modal-open');
            }
        }

        function scrollToCurrentDay() {
            const todayEl = document.querySelector('.today-card');
            if (todayEl) {
                const container = todayEl.parentElement;
                if(container.classList.contains('flex')){ 
                    container.scrollTo({ left: todayEl.offsetLeft - container.getBoundingClientRect().width * 0.05, behavior: 'smooth' });
                }
            }
        }
        
        const updateMotivationsspruch = () => document.getElementById('motivations-spruch').textContent = motivationsSprueche[Math.floor(Math.random() * motivationsSprueche.length)];
        
        function setupRadioStyling() {
            const radios = document.querySelectorAll('input[name="kategorie"]');
            const durationContainer = document.getElementById('pc-duration-container');
            const update = () => {
                const selected = document.querySelector('input[name="kategorie"]:checked')?.value;
                durationContainer.classList.toggle('hidden', selected !== 'pc');
                radios.forEach(r => {
                    const d = r.nextElementSibling;
                    const isActive = r.checked;
                    d.classList.toggle('active', isActive);
                    d.classList.toggle('bg-indigo-600', isActive);
                    d.classList.toggle('border-indigo-500', isActive);
                    d.classList.toggle('text-white', isActive);
                    d.classList.toggle('font-bold', isActive);
                    d.classList.toggle('border-border-color', !isActive);
                });
            };
            radios.forEach(radio => radio.addEventListener('change', update));
            update();
        }
        
        function starteKonfetti() {
            sounds.confetti.triggerAttackRelease("G4", "0.4");
            const container = document.getElementById('konfetti-container');
            for (let i = 0; i < 50; i++) {
                const konfetti = document.createElement('div');
                konfetti.className = 'konfetti-stueck';
                konfetti.style.left = `${Math.random() * 100}vw`;
                konfetti.style.animationDelay = `${Math.random() * 2}s`;
                konfetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 60%)`;
                konfetti.style.transform = `scale(${Math.random() * 0.7 + 0.5})`;
                container.appendChild(konfetti);
                setTimeout(() => konfetti.remove(), 3000);
            }
        }
        
        function initTheme() {
            const data = JSON.parse(storage.getItem('wochenplanerData') || '{}');
            if (data.theme === 'dark' || (data.theme === undefined && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.body.classList.add('dark');
            }
            updateThemeIcons();
        }
        
        function toggleTheme() {
            document.body.classList.toggle('dark');
            updateThemeIcons();
            saveData();
        }
        
        function updateThemeIcons() {
            const isDark = document.body.classList.contains('dark');
            document.getElementById('theme-icon').textContent = isDark ? '🌙' : '🌞';
        }

        // --- Coins System ---
        function addCoins(amount) {
            coins += amount;
            updateCoinsDisplay();
            saveData();
            document.querySelector('.coin').classList.add('level-up');
            setTimeout(() => document.querySelector('.coin').classList.remove('level-up'), 1000);
        }

        function updateCoinsDisplay() {
            document.getElementById('coins-count').textContent = coins;
        }

        // --- Mini-Games ---
        function initGames() {
            // Memory Game
            document.getElementById('memory-restart').addEventListener('click', initMemoryGame);
            
            // Quiz Game
            document.getElementById('quiz-next').addEventListener('click', nextQuizQuestion);
        }

        function openGame(gameName) {
            currentGame = gameName;
            if (gameName === 'memory') {
                document.getElementById('memory-game-modal').classList.remove('hidden');
                initMemoryGame();
            } else if (gameName === 'quiz') {
                document.getElementById('quiz-game-modal').classList.remove('hidden');
                initQuizGame();
            }
        }

        function closeGame() {
            if (currentGame === 'memory') {
                document.getElementById('memory-game-modal').classList.add('hidden');
            } else if (currentGame === 'quiz') {
                document.getElementById('quiz-game-modal').classList.add('hidden');
            }
            currentGame = null;
        }

        // Memory Game
        let memoryCards = [];
        let memoryFlippedCards = [];
        let memoryMatchedPairs = 0;
        let memoryScore = 0;

        function initMemoryGame() {
            const board = document.getElementById('memory-board');
            board.innerHTML = '';
            memoryFlippedCards = [];
            memoryMatchedPairs = 0;
            memoryScore = 0;
            document.getElementById('memory-score').textContent = memoryScore;
            document.getElementById('memory-pairs').textContent = memoryMatchedPairs;
            document.getElementById('memory-progress').style.width = '0%';

            // Erstelle Kartenpaare
            const symbols = ['🎮', '🎯', '🏆', '⭐', '🚀', '🌈'];
            memoryCards = [...symbols, ...symbols];
            shuffleArray(memoryCards);

            // Erstelle Karten
            memoryCards.forEach((symbol, index) => {
                const card = document.createElement('div');
                card.className = 'memory-card bg-indigo-500 rounded-xl flex items-center justify-center text-2xl cursor-pointer transform transition-transform hover:scale-105 relative overflow-hidden';
                card.dataset.index = index;
                card.dataset.symbol = symbol;
                card.innerHTML = '?';
                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
        }

        function flipCard() {
            if (memoryFlippedCards.length === 2) return;
            if (this.classList.contains('flipped')) return;

            this.classList.add('flipped');
            this.innerHTML = this.dataset.symbol;
            memoryFlippedCards.push(this);

            if (memoryFlippedCards.length === 2) {
                setTimeout(checkMatch, 500);
            }
        }

        function checkMatch() {
            const [card1, card2] = memoryFlippedCards;
            if (card1.dataset.symbol === card2.dataset.symbol) {
                // Match
                memoryMatchedPairs++;
                memoryScore += 10;
                document.getElementById('memory-score').textContent = memoryScore;
                document.getElementById('memory-pairs').textContent = memoryMatchedPairs;
                document.getElementById('memory-progress').style.width = `${(memoryMatchedPairs / 6) * 100}%`;
                
                // Deaktiviere Karten
                card1.removeEventListener('click', flipCard);
                card2.removeEventListener('click', flipCard);
                card1.classList.add('matched');
                card2.classList.add('matched');
                
                // Belohnung bei Abschluss
                if (memoryMatchedPairs === 6) {
                    addCoins(20);
                    sounds.confetti.triggerAttackRelease("C5", "0.5");
                }
            } else {
                // Kein Match
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    card1.innerHTML = '?';
                    card2.innerHTML = '?';
                }, 500);
            }
            memoryFlippedCards = [];
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // Quiz Game
        const quizQuestions = [
            { question: "Wie viele Planeten hat unser Sonnensystem?", options: ["7", "8", "9", "10"], answer: 1 },
            { question: "Welches ist das größte Säugetier der Welt?", options: ["Elefant", "Blauwal", "Giraffe", "Nilpferd"], answer: 1 },
            { question: "Wie viele Kontinente gibt es?", options: ["5", "6", "7", "8"], answer: 2 },
            { question: "Welcher Planet ist der Sonne am nächsten?", options: ["Venus", "Mars", "Merkur", "Jupiter"], answer: 2 },
            { question: "Wie viele Knochen hat ein erwachsener Mensch?", options: ["206", "250", "300", "180"], answer: 0 }
        ];
        
        let currentQuizQuestion = 0;
        let quizScore = 0;

        function initQuizGame() {
            currentQuizQuestion = 0;
            quizScore = 0;
            document.getElementById('quiz-score').textContent = quizScore;
            document.getElementById('quiz-progress').textContent = currentQuizQuestion + 1;
            document.getElementById('quiz-progress-bar').style.width = '20%';
            showQuizQuestion();
        }

        function showQuizQuestion() {
            const question = quizQuestions[currentQuizQuestion];
            document.getElementById('quiz-question').textContent = question.question;
            const optionsContainer = document.getElementById('quiz-options');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = 'quiz-option w-full text-left p-3 bg-accent rounded-lg hover:bg-indigo-200 transition relative overflow-hidden';
                button.textContent = option;
                button.onclick = () => checkQuizAnswer(index);
                optionsContainer.appendChild(button);
            });
            
            document.getElementById('quiz-next').classList.add('hidden');
        }

        function checkQuizAnswer(selectedIndex) {
            const question = quizQuestions[currentQuizQuestion];
            const options = document.querySelectorAll('#quiz-options button');
            
            // Markiere richtige und falsche Antwort
            options[question.answer].classList.add('bg-green-200');
            if (selectedIndex !== question.answer) {
                options[selectedIndex].classList.add('bg-red-200');
            }
            
            // Punkte vergeben
            if (selectedIndex === question.answer) {
                quizScore += 20;
                document.getElementById('quiz-score').textContent = quizScore;
                sounds.complete.triggerAttackRelease("C5", "0.2");
            }
            
            // Nächste Frage oder Spielende
            document.getElementById('quiz-next').classList.remove('hidden');
        }

        function nextQuizQuestion() {
            currentQuizQuestion++;
            if (currentQuizQuestion < quizQuestions.length) {
                document.getElementById('quiz-progress').textContent = currentQuizQuestion + 1;
                document.getElementById('quiz-progress-bar').style.width = `${((currentQuizQuestion + 1) / quizQuestions.length) * 100}%`;
                showQuizQuestion();
            } else {
                // Spielende
                addCoins(quizScore);
                document.getElementById('quiz-question').textContent = `Geschafft! Du hast ${quizScore} Punkte erreicht!`;
                document.getElementById('quiz-options').innerHTML = '';
                document.getElementById('quiz-next').classList.add('hidden');
            }
        }

        // --- Meta Bar Update ---
        function updateMetaBar() {
            const start = getStartOfWeek(new Date());
            const end = new Date(start); end.setDate(end.getDate() + 7);
            const done = tasks.filter(t => t.erledigt && t.date >= getISODate(start) && t.date < getISODate(end)).length;
            const percent = Math.round((done / wochenZiel) * 100);
            document.title = `${percent}% · Wochen-Power`;
            document.getElementById('themeMeta').setAttribute('content', percent >= 100 ? '#10b981' : '#0284c7');
        }
    </script>
</body>
</html>
