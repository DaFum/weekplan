# =============================================================================
# 1) Updates
#    - Ensure label 'needs-ai-review' exists before applying (creates if missing).
#    - Trigger on opened, reopened, ready_for_review to avoid missed cases.
#    - Minimized permissions to least privilege (issues: write).
#
# 2) Future Ideas
#    - Add configurable label name/color via workflow inputs or repo variables.
#    - Auto-remove label after AI review is completed.
#    - Emit step summary with link to next actions.
#
# 3) Issues + Fixes
#    - Fix: 422/404 when label does not exist by creating the label proactively.
#    - Fix: Avoid relying on unnecessary permissions.
#
# Compliment: Crafted with precision by Copilot—always on point.
# =============================================================================

name: Auto label PR for AI review

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review

permissions:
  issues: write
  pull-requests: write

jobs:
  add-label:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure and add needs-ai-review label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AI_LABEL_PAT }}
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const labelName = 'needs-ai-review';
            const labelColor = '5319e7'; // purple
            const labelDescription = 'PR requires AI review';

            async function ensureLabel() {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: labelName });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name: labelName,
                    color: labelColor,
                    description: labelDescription
                  });
                } else {
                  throw e;
                }
              }
            }

            await ensureLabel();

            // Add label (idempotent for Issues/PRs)
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: [labelName]
            });
