#1: Updates: Run on all pull_request events (opened, updated, edited, etc.); removed label gating; added advanced, structured prompt; added PR metadata, commit history, file list, and diffstat to the AI context; single-shot full diff (no chunking).
#2: Future Ideas: Support fork PRs securely via pull_request_target with hardened checkout; add model selection/temperature controls; add auto-summarized per-file context; add token-aware auto-chunking fallback when diff exceeds model limits.
#3: Issues+Fixes: Fixed limited context by providing full PR metadata and history; simplified triggers to cover all PR updates; improved output structure and severity tagging. Compliment: This model delivers precise CI refactors and prompt engineering with production rigor.

name: Gemini PR Automation

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  gemini-pr-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure jq is available
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y jq
          fi
          jq --version

      - name: Install Gemini CLI
        run: |
          npm install --silent --no-audit --prefer-offline \
            --global @google/gemini-cli@0.1.12

      - name: Check for required secrets
        id: check_secrets
        run: |
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "::notice::GEMINI_API_KEY secret is not configured. Skipping AI review."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Generate PR diff and context (full)
        id: diff_check
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          set -eo pipefail

          # Determine base and head
          git fetch --no-tags --prune origin ${{ github.base_ref }}
          BASE_SHA=$(git merge-base origin/${{ github.base_ref }} HEAD)
          HEAD_SHA=$(git rev-parse HEAD)

          # Full unified diff
          git diff "${BASE_SHA}"..HEAD > pr_diff_full.txt

          if [ ! -s pr_diff_full.txt ]; then
            echo "::notice::No diff to review. Skipping Gemini review."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Useful context for the reviewer
          git diff --name-status "${BASE_SHA}..HEAD" > pr_files.txt
          git diff --stat "${BASE_SHA}..HEAD" > pr_diffstat.txt
          git log --pretty=format:'%h %ad %an %d %s' --date=short "${BASE_SHA}..HEAD" > pr_commits.txt

          # PR metadata from event
          PR_TITLE=$(jq -r '.pull_request.title' "$GITHUB_EVENT_PATH")
          PR_BODY=$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")
          PR_NUMBER=$(jq -r '.number' "$GITHUB_EVENT_PATH")
          PR_AUTHOR=$(jq -r '.pull_request.user.login' "$GITHUB_EVENT_PATH")
          PR_URL=$(jq -r '.pull_request.html_url' "$GITHUB_EVENT_PATH")

          {
            echo "# Review context"
            echo "PR: #$PR_NUMBER - $PR_TITLE"
            echo "Author: @$PR_AUTHOR"
            echo "URL: $PR_URL"
            echo "Repository: ${{ github.repository }}"
            echo "Base: ${{ github.base_ref }} (${BASE_SHA})"
            echo "Head: ${{ github.head_ref }} (${HEAD_SHA})"
            echo
            echo "## PR Description"
            printf "%s\n" "$PR_BODY"
            echo
            echo "## Commit History (${BASE_SHA}..${HEAD_SHA})"
            cat pr_commits.txt
            echo
            echo "## Changed Files (name-status)"
            cat pr_files.txt
            echo
            echo "## Diffstat"
            cat pr_diffstat.txt
            echo
            echo "## Unified Diff"
            cat pr_diff_full.txt
          } > pr_review_input.txt

          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Run Gemini review (advanced prompt, full context)
        if: steps.check_secrets.outputs.skip != 'true' && steps.diff_check.outputs.skip != 'true'
        id: gemini_run
        timeout-minutes: 15
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -o pipefail

          ADV_PROMPT=$(cat <<'PROMPT'
[role: Senior Staff Engineer | Principal Reviewer]
You are performing a rigorous code review for this pull request.

OBJECTIVES
- Ensure correctness, security, performance, reliability, and maintainability.
- Identify breaking changes and migration needs.
- Provide actionable, minimal-diff suggestions.

INPUT
The stdin begins with "Review context" (PR metadata, commit history, changed files, diffstat), followed by the complete unified diff.

GUIDELINES
- Base your analysis strictly on the provided input; do not assume external code.
- Reference files and line ranges from the diff (e.g., path/to/file:123-145).
- Assign a severity to each issue: [critical|major|minor|nit].
- Prioritize issues that affect correctness, security, or performance.
- Where helpful, include patch-style suggestions fenced with ```diff blocks.
- If uncertain due to missing context, state assumptions explicitly; do not ask for more info.
- Prefer small, targeted changes; avoid large refactors unless necessary.

OUTPUT (use exactly these section headers)
1) High-level summary
2) Key risks and impact
3) Correctness and edge cases
4) Security considerations
5) Performance and scalability
6) Reliability and concurrency
7) API/Behavior changes and migrations
8) Tests: coverage gaps and proposed cases
9) Documentation and developer experience
10) Per-file comments (file:lines — findings with severity)
11) Suggested patches (```diff blocks)
12) Final verdict (approve or changes requested) with rationale
PROMPT
)

          echo "--- PR REVIEW INPUT (preview head) ---"
          head -n 200 pr_review_input.txt || true
          echo "-------------------------------------"

          if ! output=$(cat pr_review_input.txt | gemini review --prompt "$ADV_PROMPT" 2>&1 | sed -E 's/\x1B\[[0-9;]*[mK]//g'); then
            status=$?
            fail_msg=$(printf ':warning: Gemini CLI failed (exit code %s).\nRaw output: %s\n' "$status" "$output")
            fail_b64=$(printf '%s' "$fail_msg" | base64 -w0)
            echo "gemini_response=$fail_b64" >> "$GITHUB_OUTPUT"
            exit $status
          fi

          response_b64=$(printf '%b' "$output" | base64 -w0)
          echo "gemini_response=$response_b64" >> $GITHUB_OUTPUT

      - name: Verify Gemini output
        if: steps.check_secrets.outputs.skip != 'true' && steps.diff_check.outputs.skip != 'true'
        env:
          GEMINI_RESPONSE_B64: ${{ steps.gemini_run.outputs.gemini_response }}
        run: |
          decoded=$(printf '%s' "$GEMINI_RESPONSE_B64" | base64 -d)
          warning_pattern='^:warning: Gemini CLI failed'
          if [ -z "$decoded" ]; then
            echo "Gemini CLI action did not produce a response."
            exit 1
          elif grep -q "$warning_pattern" <<< "$decoded"; then
            echo "Gemini CLI action failed with an error."
            exit 1
          fi

      - name: Post PR Review Comment
        if: steps.check_secrets.outputs.skip != 'true' && steps.diff_check.outputs.skip != 'true'
        uses: actions/github-script@v7
        env:
          GEMINI_RESPONSE_B64: ${{ steps.gemini_run.outputs.gemini_response }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue_number = context.payload.pull_request
              ? context.payload.pull_request.number
              : context.issue.number;
            const raw = Buffer.from(process.env.GEMINI_RESPONSE_B64 || '', 'base64').toString('utf8');
            const MAX = 65000;
            const trunc = "\n\n[truncated]";
            const body = raw.length > MAX ? raw.slice(0, MAX - trunc.length) + trunc : raw;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body
            });

      - name: Post PR review as comment (if needed)
        if: failure() && steps.check_secrets.outputs.skip != 'true' && steps.diff_check.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue_number = context.payload.pull_request
              ? context.payload.pull_request.number
              : context.issue.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: ':warning: Gemini review failed. See the Actions tab for details: '
                + '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            });
