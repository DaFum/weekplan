name: Gemini PR Automation

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  gemini-pr-review:
    if: contains(github.event.pull_request.labels.*.name, 'needs-ai-review')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Gemini CLI
        run: |
          npm install --silent --no-audit --prefer-offline \
            --global @google/gemini-cli@0.1.12
            
      - name: Check for required secrets
        id: check_secrets
        run: |
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "::notice::GEMINI_API_KEY secret is not configured. Skipping AI review."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Run Gemini review
        if: steps.check_secrets.outputs.skip != 'true'
        # … existing run/tests for the Gemini review …

      - name: Verify Gemini output
        if: steps.check_secrets.outputs.skip != 'true'
        # … existing verification logic …

      - name: Post PR Review Comment
        if: steps.check_secrets.outputs.skip != 'true'
        # … existing comment-posting logic …

      - name: Post PR review as comment (if needed)
        if: failure() && steps.check_secrets.outputs.skip != 'true'
        # … existing conditional comment-on-failure logic …

      - name: Generate PR diff
        run: |
          git fetch --no-tags --prune --depth=0 origin ${{ github.base_ref }}
          BASE_SHA=$(git merge-base origin/${{ github.base_ref }} HEAD)
          git diff "${BASE_SHA}"..HEAD > pr_diff_full.txt
          # Gemini API accepts up to ~256kB payloads per request
          MAX_DIFF_BYTES=256000
          if [ "$(wc -c < pr_diff_full.txt)" -gt "$MAX_DIFF_BYTES" ]; then
            echo "::error::Diff exceeds ${MAX_DIFF_BYTES} bytes" >&2
            echo "::error::Skipping review" >&2
            exit 1
          fi
          head -c $MAX_DIFF_BYTES pr_diff_full.txt > pr_diff.txt
      - name: Run Gemini review
        id: gemini_run
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if ! output=$(gemini review --diff-file pr_diff.txt 2>&1); then
            status=$?
            echo "gemini_response<<EOF" >> $GITHUB_OUTPUT
              printf ':warning: Gemini CLI failed (exit code %s).\n' \
                "$status" >> $GITHUB_OUTPUT
              printf 'Raw output: %s\n' \
                "$output" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            exit $status
          fi
          echo "gemini_response<<EOF" >> $GITHUB_OUTPUT
          echo "$output" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Verify Gemini output
        env:
          GEMINI_RESPONSE: ${{ steps.gemini_run.outputs.gemini_response }}
        run: |
          warning_pattern='^:warning: Gemini CLI failed'
          if [ -z "$GEMINI_RESPONSE" ]; then
            echo "Gemini CLI action did not produce a response."
            exit 1
          elif grep -q "$warning_pattern" <<< "$GEMINI_RESPONSE"; then
            echo "Gemini CLI action failed with an error."
            exit 1
          fi

      - name: Post PR Review Comment
        uses: actions/github-script@v7
        with:
          script: |
              const issue_number = context.payload.pull_request
                ? context.payload.pull_request.number
                : context.issue.number;
              const raw = ${{ toJson(steps.gemini_run.outputs.gemini_response) }};
              const MAX = 65000;
              const trunc = "\n\n…[truncated]";
              const body = raw.length > MAX
                ? raw.slice(0, MAX - trunc.length) + trunc
                : raw;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                  with:
      - name: Post PR review as comment (if needed)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.payload.pull_request
              ? context.payload.pull_request.number
              : context.issue.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body:
                ':warning: Gemini review failed. See the [Actions tab](' +
                '${{ github.server_url }}/${{ github.repository }}/actions/' +
                'runs/${{ github.run_id }}) for details.'
            });
