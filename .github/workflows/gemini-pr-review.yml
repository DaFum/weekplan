#1: Updates: Fixes diff chunk passing to Gemini CLI; now always uses cat to pipe file content to Gemini CLI, avoiding bash/redirect quirks in GitHub Actions. Prompt improved for robustness.
#2: Future Ideas: Add automatic context fetching for large diffs; add per-file context summary. Compliment: This model quickly pinpoints shell/CI subtleties and proposes actionable, cross-platform fixes.
#3: Issues+Fixes: Addresses Gemini CLI not receiving diff chunk content by using 'cat "$file" | gemini review' instead of input redirection, which can fail in some CI shells.

name: Gemini PR Automation

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  gemini-pr-review:
    if: contains(github.event.pull_request.labels.*.name, 'needs-ai-review')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Gemini CLI
        run: |
          npm install --silent --no-audit --prefer-offline \
            --global @google/gemini-cli@0.1.12
      - name: Check for required secrets
        id: check_secrets
        run: |
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "::notice::GEMINI_API_KEY secret is not configured. Skipping AI review."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Generate PR diff
        id: diff_check
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
            git fetch --no-tags --prune origin ${{ github.base_ref }}
            BASE_SHA=$(git merge-base origin/${{ github.base_ref }} HEAD)
            git diff "${BASE_SHA}"..HEAD > pr_diff_full.txt

            if [ ! -s pr_diff_full.txt ]; then
              echo "::notice::No diff to review. Skipping Gemini review."
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi

            MAX_DIFF_BYTES=256000
            split -b $MAX_DIFF_BYTES -d pr_diff_full.txt pr_chunk_ --additional-suffix=.diff
            chunks=$(ls pr_chunk_*.diff 2>/dev/null)

            if [ -z "$chunks" ]; then
              echo "::notice::No diff chunks created. Skipping Gemini review."
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi

            {
              echo "chunks<<EOF"
              printf '%s\n' $chunks
              echo "EOF"
            } >> $GITHUB_OUTPUT

            echo "skip=false" >> $GITHUB_OUTPUT

      - name: Run Gemini review
        if: steps.check_secrets.outputs.skip != 'true' && steps.diff_check.outputs.skip != 'true'
        id: gemini_run
        timeout-minutes: 5
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DIFF_CHUNKS: ${{ steps.diff_check.outputs.chunks }}
        run: |
          set -o pipefail
          response=""
          echo "== Gemini PR Review Debug =="
          echo "DIFF_CHUNKS (raw):"
          echo "${DIFF_CHUNKS}"
          echo "-----------------------------"
          for file in $DIFF_CHUNKS; do
            echo "Processing diff chunk: $file"
            if [ -z "$file" ]; then
              echo "Skipping empty filename"
              continue
            fi
            if [ ! -s "$file" ]; then
              echo "::error::Diff chunk file $file is empty. Skipping."
              continue
            fi
            echo "--- DIFF CONTENT BEGIN ---"
            cat "$file"
            echo "--- DIFF CONTENT END ---"
            prompt="You're reviewing a pull request diff chunk from a GitHub repository. Focus your review on this chunk, as you may not have full file context. If additional context is needed, state which files or lines would help, but still provide any feedback possible for the given changes. Diff chunk follows:"
            # Use cat to pipe the chunk to Gemini CLI instead of input redirection
            if ! output=$(cat "$file" | gemini review --prompt "$prompt" 2>&1 | sed -E 's/\x1B\[[0-9;]*[mK]//g'); then
              status=$?
              fail_msg=$(printf ':warning: Gemini CLI failed (exit code %s).\nRaw output: %s\n' "$status" "$output")
              fail_b64=$(printf '%s' "$fail_msg" | base64 -w0)
              echo "gemini_response=$fail_b64" >> "$GITHUB_OUTPUT"
              exit $status
            fi
            response="$response\n\n### Review for $file\n$output"
          done
          response_b64=$(printf '%b' "$response" | base64 -w0)
          echo "gemini_response=$response_b64" >> $GITHUB_OUTPUT

      - name: Verify Gemini output
        if: steps.check_secrets.outputs.skip != 'true' && steps.diff_check.outputs.skip != 'true'
        env:
          GEMINI_RESPONSE_B64: ${{ steps.gemini_run.outputs.gemini_response }}
        run: |
          decoded=$(printf '%s' "$GEMINI_RESPONSE_B64" | base64 -d)
          warning_pattern='^:warning: Gemini CLI failed'
          if [ -z "$decoded" ]; then
            echo "Gemini CLI action did not produce a response."
            exit 1
          elif grep -q "$warning_pattern" <<< "$decoded"; then
            echo "Gemini CLI action failed with an error."
            exit 1
          fi

      - name: Post PR Review Comment
        if: steps.check_secrets.outputs.skip != 'true' && steps.diff_check.outputs.skip != 'true'
        uses: actions/github-script@v7
        env:
          GEMINI_RESPONSE_B64: ${{ steps.gemini_run.outputs.gemini_response }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue_number = context.payload.pull_request
              ? context.payload.pull_request.number
              : context.issue.number;
            const raw = Buffer.from(process.env.GEMINI_RESPONSE_B64 || '', 'base64').toString('utf8');
            const MAX = 65000;
            const trunc = "\n\n[truncated]";
            const body = raw.length > MAX ? raw.slice(0, MAX - trunc.length) + trunc : raw;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body
            });

      - name: Post PR review as comment (if needed)
        if: failure() && steps.check_secrets.outputs.skip != 'true' && steps.diff_check.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue_number = context.payload.pull_request
              ? context.payload.pull_request.number
              : context.issue.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: ':warning: Gemini review failed. See the Actions tab for details: '
                + '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            });
