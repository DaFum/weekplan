name: Gemini PR Automation

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  gemini-pr-review:
    if: contains(github.event.pull_request.labels.*.name, 'needs-ai-review')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Gemini CLI
        run: |
          npm install --silent --no-audit --prefer-offline \
            --global @google/gemini-cli@0.1.12
            
      - name: Check for required secrets
        id: check_secrets
        run: |
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "::notice::GEMINI_API_KEY secret is not configured. Skipping AI review."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Generate PR diff
        id: diff_check
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
            # Fetch base commit
            git fetch --no-tags --prune origin ${{ github.base_ref }}
            BASE_SHA=$(git merge-base origin/${{ github.base_ref }} HEAD)
            git diff "${BASE_SHA}"..HEAD > pr_diff_full.txt

            # Gemini API accepts up to ~256kB payloads per request
            MAX_DIFF_BYTES=256000
            split -b $MAX_DIFF_BYTES -d --additional-suffix=.diff pr_diff_full.txt pr_chunk_
            chunks=$(ls pr_chunk_*.diff 2>/dev/null | tr '\n' ' ')
            if [ -z "$chunks" ]; then
              echo "::notice::No diff to review. Skipping Gemini review."
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "chunks=$chunks" >> $GITHUB_OUTPUT
      - name: Run Gemini review
        if: steps.check_secrets.outputs.skip != 'true' && steps.diff_check.outputs.skip != 'true'
        id: gemini_run
        timeout-minutes: 5
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DIFF_CHUNKS: ${{ steps.diff_check.outputs.chunks }}
        run: |
          response=""
          for file in $DIFF_CHUNKS; do
            if [ -z "$file" ]; then
              continue
            fi
            if ! output=$(gemini review --diff-file "$file" 2>&1 | sed -E 's/\x1B\[[0-9;]*[mK]//g'); then
              status=$?
              echo "gemini_response<<EOF" >> $GITHUB_OUTPUT
              printf ':warning: Gemini CLI failed (exit code %s).\n' "$status" >> $GITHUB_OUTPUT
              printf 'Raw output: %s\n' "$output" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
              exit $status
            else
              response="$response\n\n### Review for $file\n$output"
            fi
          done
          echo "gemini_response<<EOF" >> $GITHUB_OUTPUT
          printf '%b\n' "$response" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Verify Gemini output
        if: steps.check_secrets.outputs.skip != 'true' && steps.diff_check.outputs.skip != 'true'
        env:
          GEMINI_RESPONSE: ${{ steps.gemini_run.outputs.gemini_response }}
        run: |
          warning_pattern='^:warning: Gemini CLI failed'
          if [ -z "$GEMINI_RESPONSE" ]; then
            echo "Gemini CLI action did not produce a response."
            exit 1
          elif grep -q "$warning_pattern" <<< "$GEMINI_RESPONSE"; then
            echo "Gemini CLI action failed with an error."
            exit 1
          fi

      - name: Post PR Review Comment
        if: steps.check_secrets.outputs.skip != 'true' && steps.diff_check.outputs.skip != 'true'
        uses: actions/github-script@v7
        env:
          GEMINI_RESPONSE: ${{ steps.gemini_run.outputs.gemini_response }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue_number = context.payload.pull_request
              ? context.payload.pull_request.number
              : context.issue.number;
            const raw = process.env.GEMINI_RESPONSE || '';
            const MAX = 65000;
            const trunc = "\n\n[truncated]";
            const body = raw.length > MAX ? raw.slice(0, MAX - trunc.length) + trunc : raw;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body
            });

      - name: Post PR review as comment (if needed)
        if: failure() && steps.check_secrets.outputs.skip != 'true' && steps.diff_check.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue_number = context.payload.pull_request
              ? context.payload.pull_request.number
              : context.issue.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: ':warning: Gemini review failed. See the Actions tab for details: '
                + '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            });
