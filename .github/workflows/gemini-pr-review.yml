#1: Updates: Runs on all PR events; removes label gating; fetches the complete PR diff and metadata via GitHub API (robust for forks); supplies advanced, structured prompt; avoids heredocs to prevent YAML parsing issues.
#2: Future Ideas: Token-aware fallback (auto-chunk if model rejects input); configurable model/temperature; optionally post structured review as multiple comments when exceeding size limits; support review summary check runs.
#3: Issues+Fixes: Fixed YAML syntax pitfalls by eliminating heredocs and complex inline quoting; switched to API-driven diff retrieval to avoid git ref issues; improved stability on forked PRs. Compliment: This model delivers precise, production-grade CI with strong prompt engineering.

name: Gemini PR Automation

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review
      - labeled
      - unlabeled
      - review_requested
      - review_request_removed

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  gemini-pr-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure jq is available
        run: |
          set -e
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y jq
          fi
          jq --version

      - name: Install Gemini CLI
        run: |
          npm install --silent --no-audit --prefer-offline --global @google/gemini-cli@0.1.12

      - name: Check for required secrets
        id: check_secrets
        run: |
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "::notice::GEMINI_API_KEY secret is not configured. Skipping AI review."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Generate PR diff and context (full, via API)
        id: diff_check
        if: steps.check_secrets.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          PR_NUMBER="$(jq -r '.number' "$GITHUB_EVENT_PATH")"
          PR_TITLE="$(jq -r '.pull_request.title' "$GITHUB_EVENT_PATH")"
          PR_BODY="$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")"
          PR_AUTHOR="$(jq -r '.pull_request.user.login' "$GITHUB_EVENT_PATH")"
          PR_URL="$(jq -r '.pull_request.html_url' "$GITHUB_EVENT_PATH")"
          BASE_REF="$(jq -r '.pull_request.base.ref' "$GITHUB_EVENT_PATH")"
          HEAD_REF="$(jq -r '.pull_request.head.ref' "$GITHUB_EVENT_PATH")"
          BASE_SHA="$(jq -r '.pull_request.base.sha' "$GITHUB_EVENT_PATH")"
          HEAD_SHA="$(jq -r '.pull_request.head.sha' "$GITHUB_EVENT_PATH")"
          DIFF_URL="$(jq -r '.pull_request.diff_url' "$GITHUB_EVENT_PATH")"

          API="https://api.github.com/repos/${REPO}"

          # Fetch full unified diff (robust for forks)
          curl -sSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github.v3.diff" \
            "$DIFF_URL" > pr_diff_full.txt

          if [ ! -s pr_diff_full.txt ]; then
            echo "::notice::No diff to review. Skipping Gemini review."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Fetch changed files (name/status/additions/deletions)
          curl -sSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "$API/pulls/$PR_NUMBER/files?per_page=100" > pr_files.json

          jq -r '.[] | "\(.status)\t\(.filename)\t(+\(.additions) -\(.deletions))"' pr_files.json > pr_files.txt

          # Build a diffstat-like summary
          total_add=$(jq '[.[].additions] | add // 0' pr_files.json)
          total_del=$(jq '[.[].deletions] | add // 0' pr_files.json)
          count_files=$(jq 'length' pr_files.json)
          {
            echo "Files changed: $count_files, insertions(+): $total_add, deletions(-): $total_del"
            jq -r '.[] | "\(.filename): +\(.additions) -\(.deletions)"' pr_files.json
          } > pr_diffstat.txt

          # Fetch commit history for the PR
          curl -sSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "$API/pulls/$PR_NUMBER/commits?per_page=250" > pr_commits.json

          jq -r '.[] | "\(.sha[0:7]) \(.commit.author.date) \(.commit.author.name) - \(.commit.message | gsub("\\n"; " "))"' \
            pr_commits.json > pr_commits.txt

          # Assemble single input for the reviewer
          {
            echo "# Review context"
            echo "PR: #$PR_NUMBER - $PR_TITLE"
            echo "Author: @$PR_AUTHOR"
            echo "URL: $PR_URL"
            echo "Repository: $REPO"
            echo "Base: $BASE_REF ($BASE_SHA)"
            echo "Head: $HEAD_REF ($HEAD_SHA)"
            echo
            echo "## PR Description"
            printf "%s\n" "$PR_BODY"
            echo
            echo "## Commit History ($BASE_SHA..$HEAD_SHA)"
            cat pr_commits.txt
            echo
            echo "## Changed Files (status, path, +/-)"
            cat pr_files.txt
            echo
            echo "## Diffstat"
            cat pr_diffstat.txt
            echo
            echo "## Unified Diff"
            cat pr_diff_full.txt
          } > pr_review_input.txt

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Run Gemini review (advanced prompt, full context)
        if: steps.check_secrets.outputs.skip != 'true' && steps.diff_check.outputs.skip != 'true'
        id: gemini_run
        timeout-minutes: 15
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADV_PROMPT: |
            [Role]
            Senior Staff Engineer / Principal Reviewer

            [Objectives]
            - Ensure correctness, security, performance, reliability, and maintainability.
            - Identify breaking changes and migration needs.
            - Provide actionable, minimal-diff suggestions.

            [Input]
            STDIN begins with "Review context" (PR metadata, commit history, changed files, diffstat),
            followed by the complete unified diff between base and head.

            [Guidelines]
            - Base your analysis strictly on the provided input; avoid external assumptions.
            - Reference files and line ranges from the diff (e.g., path/to/file:123-145).
            - Assign a severity to each finding: [critical | major | minor | nit].
            - Prioritize issues affecting correctness, security, or performance.
            - Include patch-style suggestions as fenced diff blocks.
            - If uncertain due to missing context, state assumptions explicitly; do not request more info.
            - Prefer small, targeted changes; avoid broad refactors unless necessary.

            [Output - use exactly these headings]
            1) High-level summary
            2) Key risks and impact
            3) Correctness and edge cases
            4) Security considerations
            5) Performance and scalability
            6) Reliability and concurrency
            7) API/Behavior changes and migrations
            8) Tests: coverage gaps and proposed cases
            9) Documentation and developer experience
            10) Per-file comments (file:lines — findings with severity)
            11) Suggested patches (fenced diff blocks)
            12) Final verdict (approve or changes requested) with rationale
        run: |
          set -o pipefail
          echo "--- PR REVIEW INPUT (preview head) ---"
          head -n 120 pr_review_input.txt || true
          echo "-------------------------------------"

          if ! output=$(cat pr_review_input.txt | gemini review --prompt "$ADV_PROMPT" 2>&1 | sed -E 's/\x1B\[[0-9;]*[mK]//g'); then
            status=$?
            fail_msg=$(printf ':warning: Gemini CLI failed (exit code %s).\nRaw output: %s\n' "$status" "$output")
            fail_b64=$(printf '%s' "$fail_msg" | base64 -w0)
            echo "gemini_response=$fail_b64" >> "$GITHUB_OUTPUT"
            exit $status
          fi

          response_b64=$(printf '%b' "$output" | base64 -w0)
          echo "gemini_response=$response_b64" >> "$GITHUB_OUTPUT"

      - name: Verify Gemini output
        if: steps.check_secrets.outputs.skip != 'true' && steps.diff_check.outputs.skip != 'true'
        env:
          GEMINI_RESPONSE_B64: ${{ steps.gemini_run.outputs.gemini_response }}
        run: |
          decoded=$(printf '%s' "$GEMINI_RESPONSE_B64" | base64 -d)
          warning_pattern='^:warning: Gemini CLI failed'
          if [ -z "$decoded" ]; then
            echo "Gemini CLI action did not produce a response."
            exit 1
          elif grep -q "$warning_pattern" <<< "$decoded"; then
            echo "Gemini CLI action failed with an error."
            exit 1
          fi

      - name: Post PR Review Comment
        if: steps.check_secrets.outputs.skip != 'true' && steps.diff_check.outputs.skip != 'true'
        uses: actions/github-script@v7
        env:
          GEMINI_RESPONSE_B64: ${{ steps.gemini_run.outputs.gemini_response }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue_number = context.payload.pull_request
              ? context.payload.pull_request.number
              : context.issue.number;
            const raw = Buffer.from(process.env.GEMINI_RESPONSE_B64 || '', 'base64').toString('utf8');
            const MAX = 65000;
            const trunc = "\n\n[truncated]";
            const body = raw.length > MAX ? raw.slice(0, MAX - trunc.length) + trunc : raw;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body
            });

      - name: Post PR review as comment on failure
        if: failure() && steps.check_secrets.outputs.skip != 'true' && steps.diff_check.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue_number = context.payload.pull_request
              ? context.payload.pull_request.number
              : context.issue.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: ':warning: Gemini review failed. See the Actions tab for details: '
                + '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            });
