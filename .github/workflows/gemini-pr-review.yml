# =============================================================================
# 1) Updates
#    - Fixed malformed "Post PR Review Comment" step (proper github-script usage).
#    - Added permissions: contents: read (required by checkout) + issues: write.
#    - Hardened checkout with full history (fetch-depth: 0) to ensure diff merge-base.
#    - Improved bash robustness; clarified diff-size guard and failure propagation.
#    - Preserved label gate: runs only when PR has 'needs-ai-review'.
#
# 2) Future Ideas
#    - Cache the Gemini CLI install via actions/setup-node cache for speed.
#    - Post results as a review (createReview) with comments on files/lines.
#    - Stream long outputs to an artifact and link it from the comment.
#
# 3) Issues + Fixes
#    - Fix: Broken YAML/indentation and misplaced inputs in github-script step.
#    - Fix: Job-level permissions missing contents: read causing checkout failures.
#    - Fix: Potential shallow-history merge-base issues by using fetch-depth: 0.
#
# =============================================================================

name: Gemini PR Automation

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  gemini-pr-review:
    if: contains(github.event.pull_request.labels.*.name, 'needs-ai-review')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gemini CLI
        run: |
          npm install --silent --no-audit --prefer-offline --global @google/gemini-cli@0.1.12

      - name: Check for required secrets
        run: |
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "::error::GEMINI_API_KEY secret is not configured."
            exit 1
          fi

      - name: Generate PR diff
        run: |
          set -euo pipefail
          # Ensure base is available for a correct merge-base diff
          git fetch --no-tags --prune --depth=0 origin ${{ github.base_ref }}
          # Use triple-dot to diff from merge-base
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff_full.txt

          # Gemini API accepts up to ~256kB payloads per request
          MAX_DIFF_BYTES=256000
          DIFF_SIZE=$(wc -c < pr_diff_full.txt | tr -d ' ')
          if [ "$DIFF_SIZE" -gt "$MAX_DIFF_BYTES" ]; then
            echo "::error::Diff exceeds ${MAX_DIFF_BYTES} bytes (was ${DIFF_SIZE})."
            echo "::error::Skipping review"
            exit 1
          fi

          head -c "$MAX_DIFF_BYTES" pr_diff_full.txt > pr_diff.txt

      - name: Run Gemini review
        id: gemini_run
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail
          if ! output="$(gemini review --diff-file pr_diff.txt 2>&1)"; then
            status=$?
            {
              echo "gemini_response<<EOF"
              printf ':warning: Gemini CLI failed (exit code %s).\n' "$status"
              printf 'Raw output:\n%s\n' "$output"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit "$status"
          fi
          {
            echo "gemini_response<<EOF"
            echo "$output"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Verify Gemini output
        env:
          GEMINI_RESPONSE: ${{ steps.gemini_run.outputs.gemini_response }}
        run: |
          set -euo pipefail
          warning_pattern='^:warning: Gemini CLI failed'
          if [ -z "${GEMINI_RESPONSE:-}" ]; then
            echo "Gemini CLI action did not produce a response."
            exit 1
          elif grep -q "$warning_pattern" <<< "$GEMINI_RESPONSE"; then
            echo "Gemini CLI action failed with an error."
            exit 1
          fi

      - name: Post PR review as comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue_number = context.payload.pull_request
              ? context.payload.pull_request.number
              : context.issue.number;

            const raw = ${{ toJson(steps.gemini_run.outputs.gemini_response) }};
            const MAX = 65000;
            const trunc = "\n\n…[truncated]";
            const body = raw.length > MAX ? raw.slice(0, MAX - trunc.length) + trunc : raw;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body
            });

      - name: Post PR review failure comment (if needed)
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue_number = context.payload.pull_request
              ? context.payload.pull_request.number
              : context.issue.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body:
                ':warning: Gemini review failed. See the Actions run for details: ' +
                `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
            });
