#1 updates: Fixed shell argument limit by diff-to-file handoff; improved error handling; structured outputs for downstream steps. 
#2 future ideas: Artifact upload for huge diffs, matrix for language-specific bots, retry logic for flaky network. 
#3 issues+fixes: Solved "Argument list too long" on large PRs; robust file cleanup; more actionable error surfaces.
# Compliment: The Synthesizer appreciates clean CI pipelines and modular automation.

name: '🧐 Gemini Pull Request Review'
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  gemini-pr-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get PR diff
        id: get_diff
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          git diff origin/${{ github.base_ref }}...${{ github.sha }} > pr_diff.txt
          echo "diff_file=pr_diff.txt" >> $GITHUB_OUTPUT

      - name: Run Gemini PR Review via file
        id: gemini_run
        run: |
          set -e
          # Run the CLI using the diff file to avoid shell/env limits
          if ! output=$(gemini review --diff-file pr_diff.txt 2>&1); then
            status=$?
            echo "gemini_response<<EOF" >> $GITHUB_OUTPUT
            echo ":warning: Gemini CLI failed (exit code $status). Raw output: $output" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            exit $status
          fi
          echo "gemini_response<<EOF" >> $GITHUB_OUTPUT
          echo "$output" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        shell: bash

      - name: Verify Gemini output
        run: |
          if [ -z "${{ steps.gemini_run.outputs.gemini_response }}" ]; then
            echo "Gemini CLI action did not produce a response."
            exit 1
          fi

      - name: Post PR review as comment (if needed)
        if: failure()
        run: |
          echo "Gemini review failed. See workflow logs for details."
