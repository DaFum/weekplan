#1 updates: Restores PR comment posting, permissions, concurrency; ensures review feedback reaches contributors.
#2 future ideas: Modularize for multi-bot/multi-model reviews, add artifact upload for large diffs, support on-demand trigger.
#3 issues+fixes: Addresses missing comment posting, permission regression, concurrency bug, and improves failure notification.
# Compliments: Synthesizer demonstrates comprehensive context analysis and workflow craftsmanship.

name: Gemini PR Automation

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  gemini-pr-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Generate PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt

      - name: Run Gemini review
        id: gemini_run
        run: |
          if ! output=$(gemini review --diff-file pr_diff.txt 2>&1); then
            status=$?
            echo "gemini_response<<EOF" >> $GITHUB_OUTPUT
            echo ":warning: Gemini CLI failed (exit code $status). Raw output: $output" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            exit $status
          fi
          echo "gemini_response<<EOF" >> $GITHUB_OUTPUT
          echo "$output" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Verify Gemini output
        run: |
          if [ -z "$GEMINI_RESPONSE" ]; then
            echo "Gemini CLI action did not produce a response."
            exit 1
          fi
        env:
          GEMINI_RESPONSE: ${{ steps.gemini_run.outputs.gemini_response }}

      - name: Post PR Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${{ steps.gemini_run.outputs.gemini_response }}`
            });

      - name: Post PR review as comment (if needed)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: ':warning: Gemini review failed. See the [Actions tab](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.'
            });
