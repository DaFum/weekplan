name: Gemini PR Automation

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  gemini-pr-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure jq is available
        run: |
          set -e
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y jq
          fi
          jq --version
          
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          PR_NUMBER="$(jq -r '.number' "$GITHUB_EVENT_PATH")"
          PR_TITLE="$(jq -r '.pull_request.title' "$GITHUB_EVENT_PATH")"
          PR_BODY="$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")"
          PR_AUTHOR="$(jq -r '.pull_request.user.login' "$GITHUB_EVENT_PATH")"
          PR_URL="$(jq -r '.pull_request.html_url' "$GITHUB_EVENT_PATH")"
          BASE_REF="$(jq -r '.pull_request.base.ref' "$GITHUB_EVENT_PATH")"
          HEAD_REF="$(jq -r '.pull_request.head.ref' "$GITHUB_EVENT_PATH")"
          BASE_SHA="$(jq -r '.pull_request.base.sha' "$GITHUB_EVENT_PATH")"
          HEAD_SHA="$(jq -r '.pull_request.head.sha' "$GITHUB_EVENT_PATH")"
          DIFF_URL="$(jq -r '.pull_request.diff_url' "$GITHUB_EVENT_PATH")"

          API="https://api.github.com/repos/${REPO}"

          # Fetch full unified diff (robust for forks)
          curl -sSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github.v3.diff" \
            "$DIFF_URL" > pr_diff_full.txt

          if [ ! -s pr_diff_full.txt ]; then
            echo "::notice::No diff to review. Skipping Gemini review."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Copy to pr_diff.txt for downstream processing: if the diff is too large for the AI model or later steps, pr_diff.txt may be truncated to fit input size limits.
          # This ensures pr_diff_full.txt always contains the complete diff, while pr_diff.txt can be safely modified or truncated as needed.
          cp pr_diff_full.txt pr_diff.txt

          echo "::group::Gemini input meta"
          echo "Bytes: $(wc -c < pr_diff.txt)"
          echo "SHA256: $(sha256sum pr_diff.txt | cut -d' ' -f1)"
          echo "::endgroup::"

          # Fetch changed files (name/status/additions/deletions)
          curl -sSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "$API/pulls/$PR_NUMBER/files?per_page=100" > pr_files.json

          jq -r '.[] | "\(.status)\t\(.filename)\t(+\(.additions) -\(.deletions))"' pr_files.json > pr_files.txt

          # Build a diffstat-like summary
          total_add=$(jq '[.[].additions] | add // 0' pr_files.json)
          total_del=$(jq '[.[].deletions] | add // 0' pr_files.json)
          count_files=$(jq 'length' pr_files.json)
          {
            echo "Files changed: $count_files, insertions(+): $total_add, deletions(-): $total_del"
            jq -r '.[] | "\(.filename): +\(.additions) -\(.deletions)"' pr_files.json
          } > pr_diffstat.txt

          # Fetch commit history for the PR
          curl -sSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "$API/pulls/$PR_NUMBER/commits?per_page=250" > pr_commits.json

          jq -r '.[] | "\(.sha[0:7]) \(.commit.author.date) \(.commit.author.name) - \(.commit.message | gsub("\\n"; " "))"' \
            pr_commits.json > pr_commits.txt

          # Assemble single input for the reviewer
          {
            echo "# Review context"
            echo "PR: #$PR_NUMBER - $PR_TITLE"
            echo "Author: @$PR_AUTHOR"
            echo "URL: $PR_URL"
            echo "Repository: $REPO"
            echo "Base: $BASE_REF ($BASE_SHA)"
            echo "Head: $HEAD_REF ($HEAD_SHA)"
            echo
            echo "## PR Description"
            printf "%s\n" "$PR_BODY"
            echo
            echo "## Commit History ($BASE_SHA..$HEAD_SHA)"
            cat pr_commits.txt
            echo
            echo "## Changed Files (status, path, +/-)"
            cat pr_files.txt
            echo
            echo "## Diffstat"
            cat pr_diffstat.txt
            echo
            echo "## Unified Diff"
            cat pr_diff_full.txt
          } > pr_review_input.txt

          echo "skip=false" >> "$GITHUB_OUTPUT"
          
      - name: Run Gemini review
        id: gemini_run
        timeout-minutes: 15
        uses: google-github-actions/run-gemini-cli@68d5a6d2e31ff01029205c58c6bf81cb3d72910b
        with:
          prompt: You are a helpful assistant. Review this {"pr_review_input.txt"}
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}

      - name: review 
        run: |
          set -euo pipefail
          echo "--- PR REVIEW INPUT (preview head) ---"
          head -n 120 pr_review_input.txt || true
          echo "-------------------------------------"
          echo "gemini_response=$response" >> "$GITHUB_OUTPUT"
          echo "failed=false" >> "$GITHUB_OUTPUT"

      - name: Post PR Review Comment
        if: success() && steps.check_secrets.outputs.skip != 'true' && steps.diff_check.outputs.skip != 'true' && steps.gemini_run.outputs.failed != 'true'
        uses: actions/github-script@v7
        env:
          GEMINI_RESPONSE: ${{ steps.review.outputs.gemini_response }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue_number = context.payload.pull_request
              ? context.payload.pull_request.number
              : context.issue.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: `${{ steps.review.outputs.gemini_response }}`
            });

      - name: Post PR review as comment on failure
        if: steps.check_secrets.outputs.skip != 'true' && steps.diff_check.outputs.skip != 'true' && steps.gemini_run.outputs.failed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue_number = context.payload.pull_request
              ? context.payload.pull_request.number
              : context.issue.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: ':warning: Gemini review skipped: model unavailable or CLI failure. See the Actions tab for details: ' +
                `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
            });
